name: Deploy Café Express to GitHub Pages

on:
  push:
    branches:
      - master # Triggers when code is pushed to the master branch

permissions:
  contents: write # Needed to push compiled assets to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: |
          # Dynamically extract the repository name to use as base-href for subdirectory hosting
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d '/' -f 2)
          npx ng build --configuration production --base-href "/$REPO_NAME/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/cafe-express/browser
          branch: gh-pages
